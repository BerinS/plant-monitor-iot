<div class="toolbar">
  <button class="add" (click)="handleAdd()">
    <p class="button-text">Add Sensor</p>
    <lucide-icon style="padding-top: 2px;" [img]="Plus" size="20"></lucide-icon>
  </button>

  <div class="sort-wrapper">
    <select id="sortSensors" [ngModel]="sortMode()" (ngModelChange)="sortMode.set($event)">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="name">Alphabetical</option>
    </select>
  </div>
</div>

<div class="sensors-wrapper">  
  @for (s of sortedSensors(); track s.id) {
    <div class="widget-card">
      <app-sensor-card-sensors 
        [sensor]="s" 
        (editRequest)="handleEdit($event)"
        (deleteRequest)="handleDelete($event)">
      </app-sensor-card-sensors>
    </div>
  } 
</div>

<app-modal 
  [type]="modalType()" 
  [isOpen]="isModalOpen()" 
  [title]="modalMode() === 'add' ? 'Add New Sensor' : modalMode() === 'edit' ? 'Edit Sensor' : 'Delete Sensor'"
  (closed)="closeModal()">
  
  @if (activeSensor(); as sensor) {
    @switch (modalMode()) {
      @case ('edit') {
        <form #sensorForm="ngForm" class="edit-form" (submit)="saveChanges(); $event.preventDefault()">
          
          <div class="form-group">
            <label for="sensorName">Sensor Name <span class="required">*</span></label>
            <input type="text" id="sensorName" name="name" [(ngModel)]="sensor.name" required placeholder="e.g., Living Room Sensor">
          </div>

          <div class="form-group">
            <label for="macAddress">MAC Address</label>
            <input type="text" id="macAddress" name="macAddress" [(ngModel)]="sensor.macAddress" placeholder="AA:BB:CC:DD:EE:FF">
          </div>

          <div class="form-group">
            <label for="currentPlantId">Plant ID</label>
            <input type="number" id="currentPlantId" name="currentPlantId" [(ngModel)]="sensor.currentPlantId" placeholder="e.g., 1">
          </div>

          <div class="form-group">
            <label for="groupId">Group ID</label>
            <input type="number" id="groupId" name="groupId" [(ngModel)]="sensor.groupId" placeholder="e.g., 1">
          </div>

          <div class="form-group">
            <label for="sensorDesc">Description</label>
            <textarea id="sensorDesc" name="description" [(ngModel)]="sensor.description" rows="3" placeholder="Monitors the monstera..."></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-success" [disabled]="sensorForm.invalid" [class.disabled]="sensorForm.invalid">Save</button>
          </div>
        </form>
      }
      @case ('add') {
        <form #sensorForm="ngForm" class="edit-form" (submit)="createNewSensor(); $event.preventDefault()">
          
          <div class="form-group">
            <label for="addSensorName">Sensor Name <span class="required">*</span></label>
            <input type="text" id="addSensorName" name="name" [(ngModel)]="sensor.name" required placeholder="e.g., Living Room Sensor">
          </div>

          <div class="form-group">
            <label for="addMacAddress">MAC Address</label>
            <input type="text" id="addMacAddress" name="macAddress" [(ngModel)]="sensor.macAddress" placeholder="AA:BB:CC:DD:EE:FF">
          </div>

          <div class="form-group">
            <label for="addCurrentPlantId">Plant ID</label>
            <input type="number" id="addCurrentPlantId" name="currentPlantId" [(ngModel)]="sensor.currentPlantId" placeholder="e.g., 1">
          </div>

          <div class="form-group">
            <label for="addGroupId">Group ID</label>
            <input type="number" id="addGroupId" name="groupId" [(ngModel)]="sensor.groupId" placeholder="e.g., 1">
          </div>

          <div class="form-group">
            <label for="addSensorDesc">Description</label>
            <textarea id="addSensorDesc" name="description" [(ngModel)]="sensor.description" rows="3" placeholder="Monitors the monstera..."></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-success" [disabled]="sensorForm.invalid" [class.disabled]="sensorForm.invalid">Add Sensor</button>
          </div>
        </form>
      }
      @case ('delete') {
        <div class="delete-content">
          <p>Are you sure you want to delete <strong>{{ sensor.name }}</strong>?</p>
          
          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="button" class="btn-danger" (click)="confirmDelete()">Delete</button>
          </div>
        </div>
      }
    }
  }
</app-modal>
