<div class="toolbar">
  <button class="add" (click)="handleAdd()">
    <p class="button-text">Add Plant</p>
    <lucide-icon style="padding-top: 2px;" [img]="Plus" size="20"></lucide-icon>
  </button>

  <div class="sort-wrapper">
    <select id="sortPlants" [ngModel]="sortMode()" (ngModelChange)="sortMode.set($event)">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="name">Alphabetical</option>
    </select>
  </div>
  
</div>

<div class="my-plants-grid">  
  @for (p of sortedPlants(); track p.id) {
    <div class="widget-card">
      <app-plant-card-my-plants 
        [plant]="p" 
        (editRequest)="handleEdit($event)"
        (deleteRequest)="handleDelete($event)">
      </app-plant-card-my-plants>
    </div>
  } 
</div>

<app-modal 
  [type]="modalType()" 
  [isOpen]="isModalOpen()" 
  [title]="modalMode() === 'edit' ? 'Edit Plant' : 'Delete Plant'"
  (closed)="closeModal()">
  
  @if (activePlant(); as plant) {
    @switch (modalMode()) {
      @case ('edit') {
        <form #plantForm="ngForm" class="edit-form" (submit)="saveChanges(); $event.preventDefault()">
          
          <div class="form-group">
            <label for="plantName">Plant Name <span class="required">*</span></label>
            <input type="text" id="plantName" name="name" [(ngModel)]="plant.name" required placeholder="e.g., Office Fern">
          </div>

          <div class="form-group">
            <label for="plantGroup">Group <span class="required">*</span></label>
            <select id="plantGroup" name="groupName" [(ngModel)]="plant.groupName" required>
              
              @for (group of groups(); track group.id) {
                <option [value]="group.name">{{ group.name }}</option>
              }
              
            </select>
          </div>

          <div class="form-group">
            <label for="plantDesc">Description</label>
            <textarea id="plantDesc" name="description" [(ngModel)]="plant.description" rows="3" placeholder="Needs water twice a week..."></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-success" [disabled]="plantForm.invalid" [class.disabled]="plantForm.invalid">Save</button>
          </div>
        </form>
      }
      @case ('add') {
        <form #plantForm="ngForm" class="edit-form" (submit)="createNewPlant(); $event.preventDefault()">
          
          <div class="form-group">
            <label for="addPlantName">Plant Name <span class="required">*</span></label>
            <input type="text" id="addPlantName" name="name" [(ngModel)]="plant.name" required placeholder="e.g., Office Fern">
          </div>

          <div class="form-group">
            <label for="addPlantGroup">Group <span class="required">*</span></label>
            <select id="plantGroup" name="groupName" [(ngModel)]="plant.groupName" required>
              
              @for (group of groups(); track group.id) {
                <option [value]="group.name">{{ group.name }}</option>
              }
              
            </select>
          </div>

          <div class="form-group">
            <label for="addPlantDesc">Description</label>
            <textarea id="addPlantDesc" name="description" [(ngModel)]="plant.description" rows="3" placeholder="Needs water twice a week..."></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-success" [disabled]="plantForm.invalid" [class.disabled]="plantForm.invalid">Add Plant</button>
          </div>
        </form>
      }
      @case ('delete') {
        <div class="delete-content">
          <p>Are you sure you want to delete <strong>{{ plant.name }}</strong>?</p>
          
          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button type="button" class="btn-danger" (click)="confirmDelete()">Delete</button>
          </div>
        </div>
      }
    }
  }
</app-modal>
