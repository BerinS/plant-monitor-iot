<div class="toolbar">
   <button class="add">
        <span>
            <svg
            height="24"
            width="24"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            >
            <path d="M0 0h24v24H0z" fill="none"></path>
            <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z" fill="currentColor"></path>
            </svg>
            Add Plant
        </span>
    </button>

    <button class="sort">
        <span>
            <svg 
                class="icon"
                width="16" 
                height="16" 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 384 512">                
                <path d="M2.4 204.2c5 12 16.6 19.8 29.6 19.8l320 0c12.9 0 24.6-7.8 29.6-19.8s2.2-25.7-6.9-34.9l-160-160c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-9.2 9.2-11.9 22.9-6.9 34.9zm0 103.5c-5 12-2.2 25.7 6.9 34.9l160 160c12.5 12.5 32.8 12.5 45.3 0l160-160c9.2-9.2 11.9-22.9 6.9-34.9S364.9 288 352 288L32 288c-12.9 0-24.6 7.8-29.6 19.8z"/>
            </svg>
            Sort
        </span>
    </button>
</div>

<div class="my-plants-grid">  
      @for (p of plants(); track p.id) {
        <div class="widget-card" [style.--col-span]="12" [style.--row-span]="1">
            <app-plant-card-my-plants [plant]="p"></app-plant-card-my-plants>
        </div>
    } 
    @empty {      
      <div class="noplants" [style.--col-span]="12" [style.--row-span]="1">            
          <lucide-icon [img]="Sprout" size="30"></lucide-icon>
          No plants to show            
      </div>     
    }  
</div>
